category: korean_llm
patterns:
  ecosystem: any
  manifestNames: [upstage]
  manifestFiles: [requirements.txt, pyproject.toml, Pipfile, package.json]
  importPatterns:
    - '^\s*from\s+upstage\b'
    - '^\s*import\s+upstage\b'
    - 'from\s+["'']@upstage/[^"'']+["'']'
  envVars: [UPSTAGE_API_KEY, SOLAR_API_KEY]
  callPatterns:
    - regex: 'api\.upstage\.ai'
      captureModel: false
    - regex: '"model"\s*:\s*"(solar-[a-z0-9-]+)"'
      captureModel: true
    - regex: 'model\s*=\s*["'']?(solar-[a-z0-9-]+)["'']?'
      captureModel: true
    - regex: '\bChatUpstage\s*\('
      captureModel: false
  apiHosts: [api.upstage.ai]
