  manifestNames: [replicate]
  manifestFiles: [requirements.txt, pyproject.toml]
  importPatterns: ['^\s*import\s+replicate\b']
  envVars: [REPLICATE_API_TOKEN]
  callPatterns:
    - regex: 'replicate\.run\s*\(\s*["'']([^"'']+)["'']'
      captureModel: true
  apiHosts: [api.replicate.com, replicate.com]
inferences:
