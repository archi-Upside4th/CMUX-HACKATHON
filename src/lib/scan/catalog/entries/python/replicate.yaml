  modelProvider: Replicate
  modalities: [text, image, video, audio]
  isGenerative: true
  isForeignModel: true
  domainHints: [marketing_creative, general]
  autoTriggeredObligations: [AIBA-NOTICE, AIBA-RISK-MGMT, AIBA-FOREIGN-REP]
  conditionalObligations:
    - obligationId: AIBA-WATERMARK
      requiresPattern: pattern.image_generation_call
confidence: high
descriptionKo: Replicate — 해외 모델 호스팅. 호출 모델 식별자 캡처.
