  manifestNames: [ollama, "ollama-ai-provider"]
  manifestFiles: [package.json]
  importPatterns:
    - 'from\s+["'']ollama["'']'
    - 'from\s+["'']ollama-ai-provider["'']'
  envVars: [OLLAMA_HOST, OLLAMA_BASE_URL]
  callPatterns:
    - regex: '\bollama\.chat\s*\(\s*\{[^}]*model\s*:\s*["'']([^"'']+)["'']'
      captureModel: true
    - regex: '\bollama\.generate\s*\(\s*\{[^}]*model\s*:\s*["'']([^"'']+)["'']'
      captureModel: true
    - regex: '\bollama\.embeddings\s*\(\s*\{[^}]*model\s*:\s*["'']([^"'']+)["'']'
